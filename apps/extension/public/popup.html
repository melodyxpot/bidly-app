<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
    }
    .status {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-primary {
      background: #171717;
      color: white;
    }
    .btn-primary:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="header">
    <strong style="font-size: 20px;">📋</strong>
    <h1>Bidly</h1>
  </div>
  <p class="status" id="status">Click the button to open the sidebar on this page.</p>
  <button class="btn btn-primary" id="toggleBtn">Open Sidebar</button>
  <script src="popup.js"></script>
</body>
</html>
